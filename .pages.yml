media:
  input: public
  output: /

content:
  - name: blog
    label: Bài viết (Blog)
    type: collection
    path: src/content/blog
    filename: '{fields.title}.md' # Tự động lấy tiêu đề làm slug tên file
    format: yaml-frontmatter
    view:
      primary: title
    fields:
      - name: title
        label: Tiêu đề bài viết
        type: string
        required: true
      - name: description
        label: Mô tả ngắn
        type: string
        required: true
      - name: date
        label: Ngày xuất bản
        type: datetime
        required: true
      - name: draft
        label: Bản nháp
        type: boolean
        default: false
      - name: body
        label: Nội dung bài viết
        type: rich-text

  - name: work
    label: Kinh nghiệm làm việc (Work)
    type: collection
    path: src/content/work
    filename: '{fields.company}.md' # Tự động lấy tên công ty làm slug tên file
    format: yaml-frontmatter
    view:
      primary: company
    fields:
      - name: company
        label: Tên công ty
        type: string
        required: true
      - name: role
        label: Vị trí / Vai trò
        type: string
        required: true
      - name: dateStart
        label: Ngày bắt đầu
        type: datetime
        required: true
      - name: dateEnd
        label: Ngày kết thúc (Nếu còn làm ghi "Present", nếu đã nghỉ thì chọn ngày)
        type: string
        required: true
        help: "Nhập dạng YYYY-MM-DD hoặc chữ 'Present'"
      - name: body
        label: Chi tiết công việc
        type: rich-text

  - name: projects
    label: Dự án cá nhân (Projects)
    type: collection
    path: src/content/projects
    filename: '{fields.title}.md' # Tự động lấy tên dự án làm slug tên file
    format: yaml-frontmatter
    view:
      primary: title
    fields:
      - name: title
        label: Tên dự án
        type: string
        required: true
      - name: description
        label: Mô tả dự án
        type: string
        required: true
      - name: date
        label: Ngày thực hiện
        type: datetime
        required: true
      - name: draft
        label: Bản nháp
        type: boolean
        default: false
      - name: demoURL
        label: Link chạy thử (Demo URL)
        type: string
      - name: repoURL
        label: Link mã nguồn (GitHub URL)
        type: string
      - name: body
        label: Chi tiết dự án
        type: rich-text
