# Cấu hình thư mục chứa hình ảnh/media
media:
  input: public
  output: /

# Định nghĩa các thư mục quản lý nội dung khớp chính xác với Astro Content Collections
content:
  - name: blog
    label: Bài viết (Blog)
    type: collection
    path: src/content/blog
    filename: '{fields.slug}.md'
    format: yaml-frontmatter
    view:
      primary: title
    fields:
      - name: slug
        label: Đường dẫn tĩnh (Slug - viết liền không dấu, ví dụ: bai-viet-moi)
        type: string
        required: true
      - name: title
        label: Tiêu đề bài viết
        type: string
        required: true
      - name: description
        label: Mô tả ngắn
        type: string
        required: true
      - name: date
        label: Ngày xuất bản
        type: datetime
        required: true
      - name: draft
        label: Bản nháp
        type: boolean
        default: false
      - name: body
        label: Nội dung bài viết
        type: rich-text

  - name: work
    label: Kinh nghiệm làm việc (Work)
    type: collection
    path: src/content/work
    filename: '{fields.slug}.md'
    format: yaml-frontmatter
    view:
      primary: company
    fields:
      - name: slug
        label: Tên file định danh (Slug - ví dụ: thiet-ke-web)
        type: string
        required: true
      - name: company
        label: Tên công ty
        type: string
        required: true
      - name: role
        label: Vị trí / Vai trò
        type: string
        required: true
      - name: dateStart
        label: Ngày bắt đầu
        type: datetime
        required: true
      - name: dateEnd
        label: Ngày kết thúc (Nếu còn làm ghi "Present", nếu đã nghỉ thì chọn ngày)
        type: string
        required: true
        help: "Do hệ thống hỗ trợ cả chữ lẫn ngày, bạn hãy nhập dạng YYYY-MM-DD hoặc chữ 'Present'"
      - name: body
        label: Chi tiết công việc
        type: rich-text

  - name: projects
    label: Dự án cá nhân (Projects)
    type: collection
    path: src/content/projects
    filename: '{fields.slug}.md'
    format: yaml-frontmatter
    view:
      primary: title
    fields:
      - name: slug
        label: Đường dẫn dự án (Slug - ví dụ: phan-mem-quan-ly)
        type: string
        required: true
      - name: title
        label: Tên dự án
        type: string
        required: true
      - name: description
        label: Mô tả dự án
        type: string
        required: true
      - name: date
        label: Ngày thực hiện
        type: datetime
        required: true
      - name: draft
        label: Bản nháp
        type: boolean
        default: false
      - name: demoURL
        label: Link chạy thử (Demo URL)
        type: string
      - name: repoURL
        label: Link mã nguồn (GitHub URL)
        type: string
      - name: body
        label: Chi tiết dự án
        type: rich-text
